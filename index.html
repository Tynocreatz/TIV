<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIV Digital Studios</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#050505; /* premium tweak */
color:white;
overflow-x:hidden;
cursor:none;
}

/* ===== SPACE BACKGROUND ===== */
.star{position:fixed;width:2px;height:2px;background:white;opacity:0.6;animation:moveStars linear infinite;}
@keyframes moveStars{from{transform:translateY(-10vh);}to{transform:translateY(110vh);}}

.nebula{position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 60%);filter:blur(40px);animation:float 25s infinite linear;}
@keyframes float{0%{transform:translate(0,0);}50%{transform:translate(50vw,30vh);}100%{transform:translate(0,0);}}

/* ===== CURSOR ===== */
.cursor{position:fixed;width:10px;height:10px;background:white;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);box-shadow:0 0 15px white;pointer-events:none;z-index:9999;}

/* ===== TOPBAR ===== */
.topbar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:space-between;padding:0 20px;backdrop-filter:blur(10px);z-index:1000;}

.socials a{color:#aaa;margin-left:15px;text-decoration:none;}
.socials a:hover{color:white;}

/* ===== SIDEBAR ===== */
.sidebar{position:fixed;top:60px;left:0;width:200px;height:100%;background:rgba(0,0,0,0.7);padding:20px;backdrop-filter:blur(10px);} 
.sidebar a{display:block;color:#aaa;text-decoration:none;margin:15px 0;}
.sidebar a:hover{color:white;}

/* ===== MAIN ===== */
.main{margin-left:220px;padding:100px 20px;}

.hero{text-align:center;margin-bottom:60px;}
.hero h1{font-size:3rem;}
.hero p{opacity:0.7;}

button{padding:12px 18px;background:white;color:black;border:none;cursor:pointer;}
button:hover{transform:scale(1.05);box-shadow:0 0 15px white;}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:rgba(255,255,255,0.05);padding:20px;border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(10px);transition:0.3s;}
.card:hover{transform:translateY(-8px);box-shadow:0 0 20px rgba(255,255,255,0.2);} 

.price{font-size:1.4rem;margin-top:10px;}
.desc{opacity:0.7;font-size:0.9rem;margin-top:10px;}

/* TABLE */
table{width:100%;margin-top:20px;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.1);} 
</html>
